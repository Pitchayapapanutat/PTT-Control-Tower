    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).

      var i = h.indexOf(':');

    }

    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;

value:tlD.tput,sub:'requests',color:'#15233F'},\n    ]:[];\n\n    // roi\n    const roiLevers=[\n      {label:'Productivity',impact:'High',impactIcon:'●',color:C.blue,detail:'AI-assisted assessment, design, remediation and testing compresses engineering effort 71%.'},\n      {label:'Time-to-market',impact:'High',impactIcon:'◕',color:C.blueL,detail:'More apps modernized per year; new ideas reach production 3.4× faster.'},\n      {label:'Risk reduction',impact:'Medium',impactIcon:'◑',color:C.purple,detail:'Retires end-of-support tech and closes security vulnerabilities across the estate.'},\n      {label:'Cost reduction',impact:'Medium',impactIcon:'◑',color:C.green,detail:'Savings from infrastructure, licensing, and maintenance & support consolidation.'},\n    ];\n    const valueBars=[{phase:'Phase 1 · 2026',label:'$1.2M',h:18},{phase:'Phase 2 · 2027',label:'$8.4M',h:62},{phase:'Phase 3 · 2028+',label:'$14.2M',h:100}];\n    const benchBars=[\n      {label:'Assessment & discovery',man:'4 wks',ai:'3 days',manPct:100,aiPct:15},\n      {label:'Design & spec',man:'5 wks',ai:'1 wk',manPct:100,aiPct:20},\n      {label:'Build & remediation',man:'5 wks',ai:'2.5 wks',manPct:100,aiPct:50},\n      {label:'Testing & validation',man:'2 wks',ai:'4 days',manPct:100,aiPct:28},\n    ];\n\n    // governance\n    const govKpis=[\n      {value:'482',label:'rationalization decisions approved',color:C.navy},\n      {value:'91%',label:'design-standard adherence',color:C.blue},\n      {value:'88%',label:'gate pass rate',color:C.green},\n      {value:'4',label:'open audit findings',color:C.amber},\n    ];\n    const govRoles=[\n      {abbr:'BO',role:'Business Owner',resp:'Owns business value, use cases, and application lifecycle decisions',fg:C.blue,bg:'#E7EDFB'},\n      {abbr:'DO',role:'Data Owner',resp:'Ensures content quality, classification, metadata, and retention policies',fg:C.green,bg:C.greenBg},\n      {abbr:'AI',role:'AI Custodian',resp:'Governs AI models, prompts, access policies, and factory performance',fg:C.purple,bg:C.purpleBg},\n      {abbr:'IT',role:'IT Team',resp:'Operates platform, integrations, security, and infrastructure',fg:C.amber,bg:C.amberBg},\n    ];\n    const govGates=[\n      {name:'Assessment gate',desc:'ATX scan + business interview complete',mark:'✓',fg:C.green,bg:C.greenBg,rate:'96%'},\n      {name:'Design gate',desc:'Kiro spec + target architecture approved',mark:'✓',fg:C.green,bg:C.greenBg,rate:'89%'},\n      {name:'Deployment gate',desc:'Test coverage + security sign-off',mark:'!',fg:C.amber,bg:C.amberBg,rate:'82%'},\n    ];\n    const govMech=[\n      {title:'Portfolio governance',items:['Rationalization criteria','Investment prioritization','Decision authority','Wave planning']},\n      {title:'Factory governance',items:['Design standards','Reusable pattern library','Quality gates','Playbook updates']},\n      {title:'AI governance',items:['Model governance','Prompt governance','Response monitoring','Access policies']},\n      {title:'Data governance',items:['Metadata standards','Ownership','Retention policies','Migration controls']},\n    ];\n\n    // roadmap\n    const phases=[\n      {tag:'PHASE 1 · M1–M4',name:'Foundation & readiness',window:'2026',accent:C.blue,barColor:C.blue,status:'IN PROGRESS',statusColor:'#fff',statusBg:C.blue,\n        focus:'Establish the baseline and prove the modernization factory.',\n        milestones:['Portfolio-wide ATX scan','Modernization blueprint + factory pilot','Modernization (app + API) roadmap'],\n        target:'2 applications modernized',targetBg:'#EEF3FD'},\n      {tag:'PHASE 2 · M5–M12',name:'Industrialization & rationalization',window:'2027',accent:C.purple,barColor:'#B8C4DA',status:'PLANNED',statusColor:'#54627A',statusBg:'#EEF1F6',\n        focus:'Rationalize the portfolio and industrialize the modernization engine.',\n        milestones:['App modernization wave 1','App retirement + API consolidation wave 1','Portfolio optimization'],\n        target:'50–80 apps modernized · 30–50% API',targetBg:'#F4F1FB'},\n      {tag:'PHASE 3 · M13–M24+',name:'Enterprise transformation',window:'2028–2029+',accent:C.green,barColor:'#D6DCE6',status:'PLANNED',statusColor:'#54627A',statusBg:'#EEF1F6',\n        focus:'Scale modernization, set up the CoE, and embed continuous improvement.',\n        milestones:['Modernization CoE established','Target portfolio optimized','Continuous modernization'],\n        target:'150–200 apps · 100% API simplification',targetBg:'#E9F4EF'},\n    ];\n    const phaseYears=['2026','2027','2028','2029+'];\n\n    return {\n      crumb:t[0], pageTitle:t[1], navTop, navBot, navTo,\n      isOverview:view==='overview', isPortfolio:view==='portfolio', isPipeline:view==='pipeline',\n      isDetail:view==='detail', isRoi:view==='roi', isGov:view==='governance', isRoadmap:view==='roadmap',\n      bubbles, dispLegend, dispBars, kpis, funnel, levers, phasesMini, attention, estSignals, bubblesFull:allBubbles,\n      buFilters, apps, tableCount:this.filteredApps().length+' of 512 applications shown',\n      matrixSubtitle: this.state.bu==='All'?'All business units · bubble size = annual cost':this.state.bu+' · bubble size = annual cost',\n      board, sel, roiLevers, valueBars, benchBars, meter,\n      govKpis, govRoles, govGates, govMech, phases, phaseYears,\n    };\n  }\n\n  statusNote(a){\n    if(a.stage==='Deployed') return 'Modernized and validated in production. Now in hypercare with monitoring against the estate health index.';\n    if(a.stage==='Test') return 'In AI-assisted QA. Regression and security validation underway ahead of the deployment gate.';\n    if(a.stage==='Build') return 'AI remediation in progress — '+a.prog+'% complete. Kiro-generated specs driving refactoring against the target architecture.';\n    if(a.stage==='Design') return 'Kiro is generating target specs and decomposition from the ATX scan. Awaiting design gate approval.';\n    if(a.stage==='Discovery') return 'ATX is scanning stack, dependencies,
